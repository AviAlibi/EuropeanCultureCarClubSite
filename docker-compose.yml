services:
    db:
        image: postgres:16-alpine
        restart: always
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: db
        ports:
            - "5432:5432"
        volumes:
            - db_data:/var/lib/postgresql/data

    app:
        build: .
        environment:
            DATABASE_URL: postgresql://postgres:postgres@db:5432/db
            NODE_ENV: production
            PORT: 3000
        ports:
            - "3000:3000"
        restart: on-failure
        depends_on:
            - db

volumes:
    db_data:
